<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>语音搜索蓝牙耳机</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif; background:#edf4ff; color:#101827; min-height:100vh; }
    .phone-page{display:none;min-height:100vh;max-width:430px;margin:0 auto;padding:24px 18px calc(24px + env(safe-area-inset-bottom));background:linear-gradient(180deg,#eaf3ff 0%,#f8fbff 42%,#fff 100%)}
    .phone-page.active{display:block}.header{padding-top:38px;margin-bottom:24px}.eyebrow{color:#2563eb;font-size:13px;font-weight:900;letter-spacing:.08em;margin-bottom:10px}h1,h2{margin:0}h1{font-size:31px;line-height:1.18;letter-spacing:-1px}.hint{margin:13px 0 0;color:#65758b;line-height:1.65;font-size:15px}
    .search-area{background:rgba(255,255,255,.96);border:1px solid #dceaff;border-radius:30px;padding:18px;box-shadow:0 18px 42px rgba(37,99,235,.13)}
    .search-input-wrap{display:flex;align-items:center;min-height:62px;border-radius:22px;background:#f2f7ff;border:1px solid #cfe0ff;padding:0 16px;gap:10px}.search-icon{font-size:21px}input,select{font-family:inherit}input{width:100%;border:0;outline:0;background:transparent;font-size:17px;color:#0f172a}input::placeholder{color:#94a3b8}
    button{border:0;cursor:pointer;font-weight:850;transition:transform .15s ease,opacity .15s ease;font-family:inherit;-webkit-tap-highlight-color:transparent}button:active{transform:scale(.985)}
    .voice-btn{width:100%;margin-top:18px;height:72px;border-radius:24px;background:#2563eb;color:white;font-size:18px;box-shadow:0 16px 30px rgba(37,99,235,.28);display:flex;align-items:center;justify-content:center;gap:12px}.voice-btn:disabled{opacity:.55;cursor:not-allowed}.voice-btn.listening{background:#ef4444}.mic{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.2);font-size:20px}
    .search-btn{width:100%;margin-top:12px;height:54px;border-radius:19px;background:#111827;color:white;font-size:16px}.select-row{display:flex;gap:10px;margin-top:12px}.select-row select{flex:1;height:44px;border-radius:16px;border:1px solid #d6e5ff;background:#fff;padding:0 12px;color:#334155}
    .status{min-height:44px;margin:14px 4px 0;color:#2563eb;font-size:14px;line-height:1.55}.warning{color:#dc2626}.log{margin-top:12px;background:#0f172a;color:#dbeafe;border-radius:18px;padding:12px;height:150px;overflow:auto;font-size:12px;line-height:1.55;white-space:pre-wrap}.chips{display:flex;gap:10px;overflow-x:auto;padding:18px 2px 4px}.chip{white-space:nowrap;border-radius:999px;background:#fff;border:1px solid #dceaff;padding:10px 14px;color:#475569;font-size:14px}
    .result-top{display:flex;align-items:center;gap:12px;padding-top:22px;margin-bottom:18px}.back-btn{width:42px;height:42px;border-radius:15px;background:#fff;color:#2563eb;border:1px solid #dbe7ff;font-size:24px}.query-line{color:#64748b;margin-top:4px;font-size:14px}.product-list{display:grid;gap:14px;padding-bottom:22px}.product{display:grid;grid-template-columns:88px 1fr;gap:14px;background:white;border-radius:24px;padding:14px;box-shadow:0 12px 30px rgba(31,80,160,.10);border:1px solid #edf3ff}.image{min-height:96px;border-radius:19px;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,#dbeafe,#f8fafc)}.info h3{margin:2px 0 6px;font-size:17px}.desc{margin:0;color:#64748b;line-height:1.45;font-size:13px}.price{font-size:19px;font-weight:900;color:#2563eb;margin-top:9px}
  </style>
</head>
<body>
  <main id="home" class="phone-page active">
    <section class="header"><div class="eyebrow">VOICE SEARCH</div><h1>你想找什么<br>蓝牙耳机？</h1><p class="hint">点击按钮后，说“降噪蓝牙耳机”。识别结果会显示在搜索框里。</p></section>
    <section class="search-area">
      <div class="search-input-wrap"><span class="search-icon">🔍</span><input id="searchInput" autocomplete="off" placeholder="语音识别结果会显示在这里" /></div>
      <button id="voiceBtn" class="voice-btn" type="button"><span class="mic">🎙️</span><span id="voiceBtnText">点击开始语音识别</span></button>
      <button id="searchBtn" class="search-btn" type="button">查看搜索结果</button>
      <div class="select-row"><select id="langSelect"><option value="zh-CN">中文 zh-CN</option><option value="cmn-Hans-CN">普通话 cmn-Hans-CN</option><option value="en-US">English en-US</option></select><select id="autoSearch"><option value="no">识别后不自动跳转</option><option value="yes">识别后自动跳转</option></select></div>
      <p id="status" class="status">提示：此版本不再调用 getUserMedia 音量检测，避免和 SpeechRecognition 抢麦克风。</p>
      <div id="log" class="log"></div>
    </section>
    <div class="chips"><button class="chip" data-text="降噪蓝牙耳机">降噪蓝牙耳机</button><button class="chip" data-text="运动蓝牙耳机">运动蓝牙耳机</button><button class="chip" data-text="长续航蓝牙耳机">长续航蓝牙耳机</button></div>
  </main>
  <main id="results" class="phone-page"><div class="result-top"><button class="back-btn" onclick="showHome()" type="button">‹</button><div><h2>搜索结果</h2><div class="query-line">你搜索了：<strong id="queryText">蓝牙耳机</strong></div></div></div><section class="product-list" id="productGrid"></section></main>
<script>
const products=[{name:'AirPods Pro 2',icon:'🎧',price:'¥1,899',desc:'主动降噪、通透模式、空间音频，适合苹果用户日常通勤。'},{name:'Sony WF-1000XM5',icon:'🎶',price:'¥1,699',desc:'旗舰级降噪与音质，适合看重音乐体验和安静环境的人。'},{name:'Bose QuietComfort Earbuds',icon:'🔇',price:'¥1,599',desc:'舒适佩戴、强降噪表现，适合办公、飞机、高铁场景。'},{name:'JBL Tune Flex',icon:'⚡',price:'¥699',desc:'性价比高、低音有力，适合运动、健身和日常使用。'}];
const $=id=>document.getElementById(id);const home=$('home'),results=$('results'),searchInput=$('searchInput'),queryText=$('queryText'),statusText=$('status'),voiceBtn=$('voiceBtn'),voiceBtnText=$('voiceBtnText'),productGrid=$('productGrid'),logBox=$('log'),langSelect=$('langSelect'),autoSearch=$('autoSearch');
function log(t){const time=new Date().toLocaleTimeString();logBox.textContent+='['+time+'] '+t+'\n';logBox.scrollTop=logBox.scrollHeight;}
function setStatus(t,err=false){statusText.textContent=t;statusText.className=err?'status warning':'status';log((err?'错误：':'状态：')+t)}
function renderProducts(){productGrid.innerHTML=products.map(p=>`<article class="product"><div class="image">${p.icon}</div><div class="info"><h3>${p.name}</h3><p class="desc">${p.desc}</p><div class="price">${p.price}</div></div></article>`).join('')}
function doSearch(){queryText.textContent=searchInput.value.trim()||'蓝牙耳机';renderProducts();home.classList.remove('active');results.classList.add('active')}function showHome(){results.classList.remove('active');home.classList.add('active')}window.showHome=showHome;
searchBtn.onclick=doSearch;searchInput.onkeydown=e=>{if(e.key==='Enter')doSearch()};document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{searchInput.value=c.dataset.text;setStatus('已填入搜索框：'+c.dataset.text)});
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let recognition=null,isListening=false,finalReceived=false,startedAt=0;
log('UA: '+navigator.userAgent);log('协议: '+location.protocol+' 主机: '+location.hostname);log('SpeechRecognition: '+!!window.SpeechRecognition);log('webkitSpeechRecognition: '+!!window.webkitSpeechRecognition);
const secure=location.protocol==='https:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';
if(!SR){voiceBtn.disabled=true;setStatus('浏览器没有 SpeechRecognition 接口。',true)}else if(!secure){voiceBtn.disabled=true;setStatus('需要 HTTPS 或 localhost。',true)}else{
  recognition=new SR();
  recognition.interimResults=true;recognition.continuous=false;recognition.maxAlternatives=3;
  voiceBtn.onclick=()=>{
    log('按钮点击');
    if(isListening){setStatus('正在停止识别。');try{recognition.stop()}catch(e){log('stop 异常：'+e.message)}return;}
    finalReceived=false;startedAt=Date.now();searchInput.value='';recognition.lang=langSelect.value;
    try{recognition.start();setStatus('已调用 start()。请等 0.5 秒后再说话，不要立刻点第二次。');voiceBtnText.textContent='正在听，点我停止';voiceBtn.classList.add('listening');}
    catch(e){setStatus('start() 启动失败：'+e.message,true);voiceBtnText.textContent='点击开始语音识别';voiceBtn.classList.remove('listening');isListening=false;}
  };
  recognition.onstart=()=>{isListening=true;setStatus('onstart 已触发：现在请清楚说“降噪蓝牙耳机”。')};
  recognition.onaudiostart=()=>log('onaudiostart：浏览器开始接收音频');
  recognition.onsoundstart=()=>log('onsoundstart：检测到声音');
  recognition.onspeechstart=()=>log('onspeechstart：检测到疑似人声');
  recognition.onspeechend=()=>log('onspeechend：人声结束');
  recognition.onaudioend=()=>log('onaudioend：音频结束');
  recognition.onresult=e=>{let finalText='',interimText='';for(let i=e.resultIndex;i<e.results.length;i++){const text=e.results[i][0].transcript.trim();log('候选：'+text+' / final='+e.results[i].isFinal);if(e.results[i].isFinal)finalText+=text;else interimText+=text;}const show=finalText||interimText;if(show){searchInput.value=show;setStatus(finalText?'识别完成：'+show:'正在识别：'+show);if(finalText){finalReceived=true;if(autoSearch.value==='yes')setTimeout(doSearch,600)}}};
  recognition.onerror=e=>{const seconds=((Date.now()-startedAt)/1000).toFixed(1);const map={aborted:'识别被中断。常见原因：点得太快、页面里还有其他录音占用、浏览器插件/系统隐私设置拦截，或浏览器语音服务不稳定。请刷新页面后只点一次，等提示后再说。', 'no-speech':'没有识别到人声。请换普通话语言项，靠近麦克风，稍等半秒后再说。', 'audio-capture':'无法获取麦克风。', 'not-allowed':'麦克风权限被拒绝。', network:'语音识别网络服务失败。', 'service-not-allowed':'当前浏览器不允许调用语音识别服务。'};setStatus((map[e.error]||('语音识别失败：'+e.error))+' 原始错误：'+e.error+'；启动后 '+seconds+' 秒。',true)};
  recognition.onend=()=>{isListening=false;voiceBtnText.textContent='点击开始语音识别';voiceBtn.classList.remove('listening');if(!finalReceived&&!searchInput.value.trim())setStatus('识别已结束，没有返回文字。可以换语言项再试，或直接在搜索框输入。')};
}
</script>
</body>
</html>
