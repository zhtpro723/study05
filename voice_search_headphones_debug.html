<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>语音搜索蓝牙耳机 - 调试版</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#edf4ff;color:#0f172a}.phone-page{display:none;min-height:100vh;max-width:430px;margin:0 auto;padding:24px 18px 32px;background:linear-gradient(180deg,#eaf3ff,#fff)}.active{display:block}.header{padding-top:36px;margin-bottom:24px}.eyebrow{color:#2563eb;font-size:13px;font-weight:900;letter-spacing:.08em;margin-bottom:10px}h1,h2{margin:0}h1{font-size:31px;line-height:1.18}.hint{color:#64748b;line-height:1.65}.card{background:#fff;border:1px solid #dceaff;border-radius:28px;padding:18px;box-shadow:0 18px 42px rgba(37,99,235,.12)}.search-input-wrap{display:flex;align-items:center;min-height:62px;border-radius:22px;background:#f2f7ff;border:1px solid #cfe0ff;padding:0 16px;gap:10px}.search-icon{font-size:21px}input{width:100%;border:0;outline:0;background:transparent;font-size:17px;color:#0f172a}button{border:0;cursor:pointer;font-weight:850;font-family:inherit;-webkit-tap-highlight-color:transparent}.voice-btn{width:100%;margin-top:18px;height:72px;border-radius:24px;background:#2563eb;color:#fff;font-size:18px;box-shadow:0 16px 30px rgba(37,99,235,.28);display:flex;align-items:center;justify-content:center;gap:12px}.voice-btn.listening{background:#ef4444}.search-btn{width:100%;margin-top:12px;height:54px;border-radius:19px;background:#111827;color:#fff;font-size:16px}.small-btn{width:100%;margin-top:10px;height:44px;border-radius:16px;background:#e0ecff;color:#1d4ed8}.status{min-height:42px;margin:14px 4px 0;color:#2563eb;font-size:14px;line-height:1.55}.warning{color:#dc2626}.debug{margin-top:12px;background:#0f172a;color:#dbeafe;border-radius:18px;padding:12px;font-size:12px;line-height:1.55;max-height:210px;overflow:auto;white-space:pre-wrap}.chips{display:flex;gap:10px;overflow-x:auto;padding:18px 2px 4px}.chip{white-space:nowrap;border-radius:999px;background:#fff;border:1px solid #dceaff;padding:10px 14px;color:#475569;font-size:14px}.result-top{display:flex;align-items:center;gap:12px;padding-top:22px;margin-bottom:18px}.back-btn{width:42px;height:42px;border-radius:15px;background:#fff;color:#2563eb;border:1px solid #dbe7ff;font-size:24px}.query-line{color:#64748b;margin-top:4px;font-size:14px}.product-list{display:grid;gap:14px}.product{display:grid;grid-template-columns:88px 1fr;gap:14px;background:#fff;border-radius:24px;padding:14px;box-shadow:0 12px 30px rgba(31,80,160,.10);border:1px solid #edf3ff}.image{min-height:96px;border-radius:19px;display:grid;place-items:center;font-size:42px;background:linear-gradient(135deg,#dbeafe,#f8fafc)}.info h3{margin:2px 0 6px;font-size:17px}.desc{margin:0;color:#64748b;line-height:1.45;font-size:13px}.price{font-size:19px;font-weight:900;color:#2563eb;margin-top:9px}
  </style>
</head>
<body>
<main id="home" class="phone-page active">
  <section class="header"><div class="eyebrow">VOICE SEARCH DEBUG</div><h1>语音搜索<br>蓝牙耳机</h1><p class="hint">点击按钮后，识别结果会显示在搜索框；调试信息会显示在下方。</p></section>
  <section class="card">
    <div class="search-input-wrap"><span class="search-icon">🔍</span><input id="searchInput" autocomplete="off" placeholder="语音识别结果会显示在这里" /></div>
    <button id="voiceBtn" class="voice-btn" type="button"><span>🎙️</span><span id="voiceBtnText">点击开始语音识别</span></button>
    <button id="searchBtn" class="search-btn" type="button">查看搜索结果</button>
    <button id="micTestBtn" class="small-btn" type="button">测试麦克风是否真的可用</button>
    <p id="status" class="status">准备就绪。请点击语音按钮。</p>
    <div id="debug" class="debug"></div>
  </section>
  <div class="chips"><button class="chip" data-text="降噪蓝牙耳机">降噪蓝牙耳机</button><button class="chip" data-text="运动蓝牙耳机">运动蓝牙耳机</button><button class="chip" data-text="长续航蓝牙耳机">长续航蓝牙耳机</button></div>
</main>
<main id="results" class="phone-page"><div class="result-top"><button class="back-btn" onclick="showHome()" type="button">‹</button><div><h2>搜索结果</h2><div class="query-line">你搜索了：<strong id="queryText">蓝牙耳机</strong></div></div></div><section class="product-list" id="productGrid"></section></main>
<script>
const products=[{name:'AirPods Pro 2',icon:'🎧',price:'¥1,899',desc:'主动降噪、通透模式、空间音频，适合苹果用户日常通勤。'},{name:'Sony WF-1000XM5',icon:'🎶',price:'¥1,699',desc:'旗舰级降噪与音质，适合看重音乐体验和安静环境的人。'},{name:'Bose QuietComfort Earbuds',icon:'🔇',price:'¥1,599',desc:'舒适佩戴、强降噪表现，适合办公、飞机、高铁场景。'},{name:'JBL Tune Flex',icon:'⚡',price:'¥699',desc:'性价比高、低音有力，适合运动、健身和日常使用。'}];
const $=id=>document.getElementById(id);const home=$('home'),results=$('results'),searchInput=$('searchInput'),queryText=$('queryText'),statusText=$('status'),voiceBtn=$('voiceBtn'),voiceBtnText=$('voiceBtnText'),productGrid=$('productGrid'),debugBox=$('debug');
function log(msg){const t=new Date().toLocaleTimeString();debugBox.textContent+='['+t+'] '+msg+'\n';debugBox.scrollTop=debugBox.scrollHeight;}
function setStatus(text,isError=false){statusText.textContent=text;statusText.className=isError?'status warning':'status';log((isError?'错误：':'状态：')+text)}
function renderProducts(){productGrid.innerHTML=products.map(p=>`<article class="product"><div class="image">${p.icon}</div><div class="info"><h3>${p.name}</h3><p class="desc">${p.desc}</p><div class="price">${p.price}</div></div></article>`).join('')}
function doSearch(){queryText.textContent=searchInput.value.trim()||'蓝牙耳机';renderProducts();home.classList.remove('active');results.classList.add('active')}function showHome(){results.classList.remove('active');home.classList.add('active')}window.showHome=showHome;
$('searchBtn').onclick=doSearch;searchInput.onkeydown=e=>{if(e.key==='Enter')doSearch()};document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{searchInput.value=c.dataset.text;setStatus('已填入搜索框：'+c.dataset.text)});
log('UA: '+navigator.userAgent);log('协议: '+location.protocol+' 主机: '+location.hostname);log('SpeechRecognition: '+Boolean(window.SpeechRecognition));log('webkitSpeechRecognition: '+Boolean(window.webkitSpeechRecognition));
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let recognition=null;let listening=false;let startedTimer=null;
function resetBtn(){listening=false;voiceBtn.classList.remove('listening');voiceBtnText.textContent='点击开始语音识别'}
async function testMic(){try{setStatus('正在请求麦克风测试……');const stream=await navigator.mediaDevices.getUserMedia({audio:true});setStatus('麦克风可用：网页确实能拿到录音权限。');stream.getTracks().forEach(t=>t.stop())}catch(e){setStatus('麦克风测试失败：'+(e.name||e.message),true)}}
$('micTestBtn').onclick=testMic;
function createRecognition(){const r=new SR();r.lang='zh-CN';r.interimResults=true;r.continuous=false;r.maxAlternatives=1;r.onstart=()=>{clearTimeout(startedTimer);listening=true;voiceBtn.classList.add('listening');voiceBtnText.textContent='正在听，点我停止';setStatus('onstart 已触发：识别服务已经开始听。请现在说话。')};r.onaudiostart=()=>setStatus('检测到音频输入。');r.onsoundstart=()=>setStatus('检测到声音。');r.onspeechstart=()=>setStatus('检测到说话声音。');r.onresult=e=>{let txt='';for(let i=e.resultIndex;i<e.results.length;i++){txt+=e.results[i][0].transcript}txt=txt.trim();if(txt){searchInput.value=txt;setStatus('识别到：'+txt)}};r.onerror=e=>{clearTimeout(startedTimer);resetBtn();const map={'not-allowed':'权限被拒绝或浏览器阻止。','no-speech':'没有检测到说话声。','audio-capture':'麦克风不可用。','network':'识别服务网络失败，常见于套壳浏览器/部分国产浏览器。','service-not-allowed':'浏览器不允许调用语音识别服务。','aborted':'识别被中断。'};setStatus((map[e.error]||'识别失败')+' 原始错误：'+e.error,true)};r.onend=()=>{clearTimeout(startedTimer);resetBtn();setStatus(searchInput.value.trim()?'识别结束，文字已放入搜索框。':'识别结束，但没有返回文字。')};return r}
if(!SR){voiceBtn.disabled=true;setStatus('浏览器没有 SpeechRecognition 接口。',true)}else{recognition=createRecognition();voiceBtn.onclick=()=>{log('按钮点击');if(listening){recognition.stop();setStatus('已手动停止。');return}try{searchInput.value='';recognition=createRecognition();recognition.start();listening=true;voiceBtn.classList.add('listening');voiceBtnText.textContent='正在启动……';setStatus('已调用 recognition.start()，等待 onstart 事件。');startedTimer=setTimeout(()=>{if(listening&&!searchInput.value.trim()){setStatus('已调用 start()，但 6 秒内没有 onstart/onresult。这个浏览器接口存在但服务不可用，建议换真正 Chrome 或接第三方语音接口。',true);resetBtn();try{recognition.abort()}catch(e){}}},6000)}catch(e){resetBtn();setStatus('start() 直接报错：'+(e.name||e.message),true)}}}
</script>
</body>
</html>
