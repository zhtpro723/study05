<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>语音搜索蓝牙耳机</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #eef5ff; color: #111827; min-height: 100vh; }
    .phone-page { display: none; min-height: 100vh; max-width: 430px; margin: 0 auto; padding: 26px 18px calc(28px + env(safe-area-inset-bottom)); background: linear-gradient(180deg, #e7f1ff 0%, #f9fbff 46%, #fff 100%); }
    .phone-page.active { display: block; }
    .header { padding-top: 34px; margin-bottom: 24px; }
    .eyebrow { color: #2563eb; font-size: 13px; font-weight: 900; letter-spacing: .08em; margin-bottom: 10px; }
    h1, h2 { margin: 0; }
    h1 { font-size: 32px; line-height: 1.18; letter-spacing: -1px; }
    .hint { margin: 13px 0 0; color: #65758b; line-height: 1.6; font-size: 15px; }
    .search-area { background: rgba(255,255,255,.96); border: 1px solid #dceaff; border-radius: 30px; padding: 18px; box-shadow: 0 18px 42px rgba(37, 99, 235, .13); }
    .search-input-wrap { display: flex; align-items: center; min-height: 62px; border-radius: 22px; background: #f2f7ff; border: 1px solid #cfe0ff; padding: 0 16px; gap: 10px; }
    .search-icon { font-size: 21px; }
    input, select { font-family: inherit; }
    input { width: 100%; border: 0; outline: 0; background: transparent; font-size: 17px; color: #0f172a; }
    input::placeholder { color: #94a3b8; }
    .select-row { display: flex; gap: 10px; margin-top: 12px; }
    select { flex: 1; height: 44px; border-radius: 15px; border: 1px solid #dbeafe; padding: 0 12px; background: #fff; color: #334155; outline: none; }
    button { border: 0; cursor: pointer; font-weight: 850; transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease; font-family: inherit; -webkit-tap-highlight-color: transparent; }
    button:active { transform: scale(.985); }
    .voice-btn { width: 100%; margin-top: 16px; min-height: 72px; border-radius: 24px; background: #2563eb; color: white; font-size: 18px; box-shadow: 0 16px 30px rgba(37, 99, 235, .28); display: flex; align-items: center; justify-content: center; gap: 12px; }
    .voice-btn:disabled { opacity: .55; cursor: not-allowed; }
    .mic { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; background: rgba(255,255,255,.2); font-size: 20px; }
    .voice-btn.listening { background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { transform: scale(1.02); } }
    .meter { height: 12px; margin-top: 14px; background: #e5edff; border-radius: 999px; overflow: hidden; border: 1px solid #d7e5ff; }
    .meter-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #60a5fa, #2563eb); transition: width .08s linear; }
    .search-btn { width: 100%; margin-top: 12px; height: 54px; border-radius: 19px; background: #111827; color: white; font-size: 16px; }
    .status { min-height: 44px; margin: 14px 4px 0; color: #2563eb; font-size: 14px; line-height: 1.55; white-space: pre-line; }
    .warning { color: #dc2626; }
    .tipbox { margin-top: 12px; padding: 12px 13px; border-radius: 16px; background: #fff7ed; color: #9a3412; font-size: 13px; line-height: 1.55; display: none; }
    .chips { display: flex; gap: 10px; overflow-x: auto; padding: 18px 2px 4px; }
    .chip { white-space: nowrap; border-radius: 999px; background: #fff; border: 1px solid #dceaff; padding: 10px 14px; color: #475569; font-size: 14px; }
    .result-top { display: flex; align-items: center; gap: 12px; padding-top: 22px; margin-bottom: 18px; }
    .back-btn { width: 42px; height: 42px; border-radius: 15px; background: #fff; color: #2563eb; border: 1px solid #dbe7ff; font-size: 24px; }
    .query-line { color: #64748b; margin-top: 4px; font-size: 14px; }
    .product-list { display: grid; gap: 14px; padding-bottom: 22px; }
    .product { display: grid; grid-template-columns: 88px 1fr; gap: 14px; background: white; border-radius: 24px; padding: 14px; box-shadow: 0 12px 30px rgba(31,80,160,.10); border: 1px solid #edf3ff; }
    .image { min-height: 96px; border-radius: 19px; display: grid; place-items: center; font-size: 42px; background: linear-gradient(135deg, #dbeafe, #f8fafc); }
    .info h3 { margin: 2px 0 6px; font-size: 17px; }
    .desc { margin: 0; color: #64748b; line-height: 1.45; font-size: 13px; }
    .price { font-size: 19px; font-weight: 900; color: #2563eb; margin-top: 9px; }
  </style>
</head>
<body>
  <main id="home" class="phone-page active">
    <section class="header">
      <div class="eyebrow">VOICE SEARCH</div>
      <h1>你想找什么<br>蓝牙耳机？</h1>
      <p class="hint">点击按钮后，等页面显示“请现在说话”，再说：降噪蓝牙耳机。</p>
    </section>
    <section class="search-area">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input id="searchInput" autocomplete="off" placeholder="语音识别结果会显示在这里" />
      </div>
      <div class="select-row">
        <select id="langSelect">
          <option value="zh-CN">普通话 zh-CN</option>
          <option value="cmn-Hans-CN">普通话 cmn-Hans-CN</option>
          <option value="zh-Hans-CN">简体中文 zh-Hans-CN</option>
          <option value="en-US">英文 en-US</option>
        </select>
      </div>
      <button id="voiceBtn" class="voice-btn" type="button">
        <span class="mic">🎙️</span>
        <span id="voiceBtnText">点击开始语音识别</span>
      </button>
      <div class="meter"><div id="meterBar" class="meter-bar"></div></div>
      <button id="searchBtn" class="search-btn" type="button">查看搜索结果</button>
      <p id="status" class="status">提示：请在 HTTPS 页面用 Chrome/Edge 测试，并允许麦克风权限。</p>
      <div id="tipbox" class="tipbox"></div>
    </section>
    <div class="chips">
      <button class="chip" data-text="降噪蓝牙耳机">降噪蓝牙耳机</button>
      <button class="chip" data-text="运动蓝牙耳机">运动蓝牙耳机</button>
      <button class="chip" data-text="长续航蓝牙耳机">长续航蓝牙耳机</button>
    </div>
  </main>
  <main id="results" class="phone-page">
    <div class="result-top">
      <button class="back-btn" onclick="showHome()" type="button">‹</button>
      <div><h2>搜索结果</h2><div class="query-line">你搜索了：<strong id="queryText">蓝牙耳机</strong></div></div>
    </div>
    <section class="product-list" id="productGrid"></section>
  </main>
  <script>
    const products = [
      { name: 'AirPods Pro 2', icon: '🎧', price: '¥1,899', desc: '主动降噪、通透模式、空间音频，适合苹果用户日常通勤。' },
      { name: 'Sony WF-1000XM5', icon: '🎶', price: '¥1,699', desc: '旗舰级降噪与音质，适合看重音乐体验和安静环境的人。' },
      { name: 'Bose QuietComfort Earbuds', icon: '🔇', price: '¥1,599', desc: '舒适佩戴、强降噪表现，适合办公、飞机、高铁场景。' },
      { name: 'JBL Tune Flex', icon: '⚡', price: '¥699', desc: '性价比高、低音有力，适合运动、健身和日常使用。' }
    ];
    const $ = id => document.getElementById(id);
    const home = $('home'), results = $('results'), searchInput = $('searchInput'), queryText = $('queryText'), statusText = $('status'), voiceBtn = $('voiceBtn'), voiceBtnText = $('voiceBtnText'), productGrid = $('productGrid'), meterBar = $('meterBar'), tipbox = $('tipbox'), langSelect = $('langSelect');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition, isListening = false, audioCtx, analyser, micStream, rafId, gotResult = false;

    function setStatus(text, err=false) { statusText.textContent = text; statusText.className = err ? 'status warning' : 'status'; }
    function showTip(text) { tipbox.style.display = 'block'; tipbox.textContent = text; }
    function hideTip() { tipbox.style.display = 'none'; }
    function renderProducts() { productGrid.innerHTML = products.map(p => `<article class="product"><div class="image">${p.icon}</div><div class="info"><h3>${p.name}</h3><p class="desc">${p.desc}</p><div class="price">${p.price}</div></div></article>`).join(''); }
    function doSearch() { queryText.textContent = searchInput.value.trim() || '蓝牙耳机'; renderProducts(); home.classList.remove('active'); results.classList.add('active'); }
    function showHome() { results.classList.remove('active'); home.classList.add('active'); }
    window.showHome = showHome;
    $('searchBtn').addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => { searchInput.value = chip.dataset.text; setStatus('已填入搜索框：' + chip.dataset.text); hideTip(); }));

    async function startMeter() {
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const src = audioCtx.createMediaStreamSource(micStream);
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);
        const draw = () => {
          analyser.getByteFrequencyData(data);
          const avg = data.reduce((a,b) => a + b, 0) / data.length;
          meterBar.style.width = Math.min(100, Math.round(avg * 2.2)) + '%';
          rafId = requestAnimationFrame(draw);
        };
        draw();
      } catch (e) { /* 浏览器权限已经由 SpeechRecognition 处理，这里只做音量条 */ }
    }
    function stopMeter() {
      if (rafId) cancelAnimationFrame(rafId);
      meterBar.style.width = '0%';
      if (micStream) micStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      micStream = null; audioCtx = null;
    }

    function makeRecognition() {
      recognition = new SR();
      recognition.lang = langSelect.value;
      recognition.interimResults = true;
      recognition.continuous = true;
      recognition.maxAlternatives = 3;
      recognition.onstart = () => { isListening = true; gotResult = false; voiceBtn.classList.add('listening'); voiceBtnText.textContent = '正在听，点我停止'; setStatus('识别已启动。请现在清楚说：降噪蓝牙耳机'); };
      recognition.onspeechstart = () => setStatus('已检测到你在说话，正在识别文字……');
      recognition.onsoundstart = () => setStatus('检测到声音输入。请清楚说出搜索词。');
      recognition.onresult = e => {
        let finalText = '', interimText = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const text = e.results[i][0].transcript.trim();
          if (e.results[i].isFinal) finalText += text; else interimText += text;
        }
        const show = finalText || interimText;
        if (show) { gotResult = true; searchInput.value = show; setStatus(finalText ? '识别完成，结果已放进搜索框。' : '正在识别：' + show); }
      };
      recognition.onerror = e => {
        const msg = {
          'no-speech': '没有识别到“说话内容”。麦克风有声音，但语音引擎没判断成人声文字。',
          'audio-capture': '没有检测到麦克风。',
          'not-allowed': '麦克风权限被拒绝。',
          'network': '语音识别服务网络失败。',
          'service-not-allowed': '当前浏览器不允许使用语音识别服务。',
          'aborted': '识别被中断。'
        }[e.error] || ('识别失败：' + e.error);
        setStatus(msg, true);
        if (e.error === 'no-speech') showTip('解决办法：1）等按钮变红并提示“请现在说”后再说；2）把识别语言换成 cmn-Hans-CN 再试；3）换电脑 Chrome 测试；4）如果仍然 no-speech，就说明浏览器内置语音服务不稳定，需要接第三方语音识别接口。');
      };
      recognition.onend = () => { isListening = false; voiceBtn.classList.remove('listening'); voiceBtnText.textContent = '点击开始语音识别'; stopMeter(); if (!gotResult && !searchInput.value.trim()) setStatus('识别结束，但没有返回文字。可以换一个识别语言再试。', true); };
    }

    if (!SR) { voiceBtn.disabled = true; setStatus('当前浏览器没有 SpeechRecognition 接口，不能使用浏览器内置语音识别。', true); }
    else {
      voiceBtn.addEventListener('click', async () => {
        hideTip();
        if (isListening && recognition) { recognition.stop(); setStatus('已手动停止，正在整理识别结果。'); return; }
        searchInput.value = '';
        startMeter();
        makeRecognition();
        try { recognition.start(); setStatus('正在启动语音识别，请稍等一下再说话……'); }
        catch (e) { setStatus('启动失败：' + e.message, true); stopMeter(); }
      });
    }
  </script>
</body>
</html>
